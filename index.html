<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teaching Schedule View Only</title>
<style>
:root {
  --y1:#bdd7ee; --y2:#fff2cc; --y3:#f4cccc; --y4:#d9ead3;
  --header:#1f4e79; --day:#d9eaf7; --bg:#f6f8fb;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:"Segoe UI",Tahoma,sans-serif;
  background:var(--bg);
  color:#1f2937;
}
header {
  background:linear-gradient(135deg,#1f4e79,#4f81bd);
  color:white;
  padding:24px 32px;
}
header h1 { margin:0; font-size:28px; }
header p { margin:6px 0 0; opacity:.9; }
.container { padding:20px 28px 40px; }
.toolbar {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  background:white;
  padding:14px;
  border-radius:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  margin-bottom:16px;
}
button, select {
  border:1px solid #cbd5e1;
  border-radius:10px;
  padding:9px 12px;
  font-size:14px;
}
button {
  background:#1f4e79;
  color:white;
  font-weight:700;
  cursor:pointer;
}
button.secondary { background:#64748b; }
.legend {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-left:auto;
}
.chip {
  padding:7px 12px;
  border-radius:999px;
  font-weight:700;
  border:1px solid #cbd5e1;
}
.y1 { background:var(--y1); }
.y2 { background:var(--y2); }
.y3 { background:var(--y3); }
.y4 { background:var(--y4); }
.panel {
  background:white;
  border-radius:18px;
  padding:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  margin-bottom:18px;
}
.schedule-wrap {
  overflow-x:auto;
  padding-bottom:8px;
}
.schedule {
  min-width:1320px;
  display:grid;
  grid-template-columns:90px repeat(22,54px);
  border:2px solid var(--header);
  border-radius:12px;
  overflow:hidden;
  background:white;
}
.time-head,.day-head {
  background:var(--header);
  color:white;
  font-weight:700;
  text-align:center;
  padding:10px 4px;
  border-right:1px solid #6d9dcc;
  font-size:13px;
}
.day-cell {
  background:var(--day);
  color:#1f4e79;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:2px solid var(--header);
  border-bottom:3px solid var(--header);
  font-size:18px;
}
.day-rows {
  grid-column:span 22;
  display:flex;
  flex-direction:column;
  border-bottom:3px solid var(--header);
}
.year-row {
  position:relative;
  display:grid;
  grid-template-columns:repeat(22,54px);
  height:72px;
  border-bottom:1px solid #dbeafe;
}
.slot {
  border-right:1px solid #e5e7eb;
  background:white;
}
.course {
  position:absolute;
  top:7px;
  bottom:7px;
  border:2px solid #334155;
  border-radius:10px;
  padding:6px 8px;
  font-weight:800;
  font-size:15px;
  line-height:1.12;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.12);
}
.course small {
  display:block;
  margin-top:3px;
  font-size:12px;
  font-weight:700;
}
.help {
  color:#475569;
  font-size:14px;
  margin-top:8px;
}
@media print {
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  body { background:white; }
  header { display:none; }
  .toolbar { display:none; }
  .container { padding:0; }
  .panel {
    box-shadow:none;
    border-radius:0;
    padding:0;
    margin:0;
  }
  .help { display:none; }
  .schedule-wrap { overflow:visible; }
  .schedule {
    transform:scale(0.70);
    transform-origin:top left;
  }
  @page {
    size:A4 landscape;
    margin:6mm;
  }
}
</style>
</head>

const days = ["จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์"];
const years = ["ปี 1","ปี 2","ปี 3","ปี 4"];
const colors = {"ปี 1":"#bdd7ee","ปี 2":"#fff2cc","ปี 3":"#f4cccc","ปี 4":"#d9ead3"};
const slotWidth = 54;
const startHour = 8;
const endHour = 19;
const totalSlots = (endHour-startHour)*2;

function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/"/g,"&quot;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function parseTimeRange(t) {
  const m = String(t||"")
    .replace(/น\.?/g,"")
    .trim()
    .match(/(\d{1,2})[.:](\d{2})\s*-\s*(\d{1,2})[.:](\d{2})/);
  if(!m) return null;
  return {
    start:parseInt(m[1])+parseInt(m[2])/60,
    end:parseInt(m[3])+parseInt(m[4])/60
  };
}

function timeLabels() {
  const a=[];
  for(let h=startHour; h<endHour; h+=0.5) {
    a.push(String(Math.floor(h)).padStart(2,"0")+":"+(h%1===0?"00":"30"));
  }
  return a;
}

function courseText(r) {
  return r.display && r.display.trim() ? r.display : r.code;
}

function overlaps(a,b) {
  return a.start < b.end && b.start < a.end;
}

function renderDashboard() {
  const filter = document.getElementById("yearFilter").value;
  const schedule = document.getElementById("schedule");
  schedule.innerHTML = "";

  const corner = document.createElement("div");
  corner.className = "day-head";
  corner.textContent = "วัน";
  schedule.appendChild(corner);

  timeLabels().forEach(t => {
    const h = document.createElement("div");
    h.className = "time-head";
    h.textContent = t;
    schedule.appendChild(h);
  });

  days.forEach(day => {
    const dayCell = document.createElement("div");
    dayCell.className = "day-cell";
    dayCell.textContent = day;
    schedule.appendChild(dayCell);

    const cont = document.createElement("div");
    cont.className = "day-rows";
    schedule.appendChild(cont);

    years.forEach(year => {
      const showYear = filter === "all" || filter === year;

      const subjects = data
        .filter(r => String(r.day).includes(day) && r.year === year)
        .map(r => Object.assign({}, r, {range:parseTimeRange(r.time)}))
        .filter(r => r.range)
        .sort((a,b) => a.range.start - b.range.start);

      const lanes = [];
      subjects.forEach(sub => {
        let placed = false;
        for(let i=0; i<lanes.length; i++) {
          const last = lanes[i][lanes[i].length-1];
          if(!overlaps(last.range, sub.range)) {
            lanes[i].push(sub);
            placed = true;
            break;
          }
        }
        if(!placed) lanes.push([sub]);
      });

      const laneCount = Math.max(1, lanes.length);

      for(let li=0; li<laneCount; li++) {
        const row = document.createElement("div");
        row.className = "year-row";

        for(let i=0; i<totalSlots; i++) {
          const sl = document.createElement("div");
          sl.className = "slot";
          row.appendChild(sl);
        }

        if(showYear) {
          (lanes[li] || []).forEach(r => {
            const left = Math.max(0, (r.range.start-startHour)*2*slotWidth);
            const width = Math.max(slotWidth, (r.range.end-r.range.start)*2*slotWidth);

            const block = document.createElement("div");
            block.className = "course";
            block.style.left = left + "px";
            block.style.width = (width-4) + "px";
            block.style.background = colors[year] || "#e5e7eb";
            block.innerHTML = '<div>' + esc(courseText(r)).replace(/\n/g,"<br>") + '</div><small>' + esc(r.time) + '</small>';
            row.appendChild(block);
          });
        }

        cont.appendChild(row);
      }
    });
  });
}
